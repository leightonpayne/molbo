<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title_html }} - Molbo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #fcfbf9;
            --surface: #dcd8cf;
            --border: #c8c1b2;
            --text: #000000;
            --text-dim: #937657;
            --accent: #937657;
            --accent-glow: #fcfbf9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-width: 0;
            padding: 8px 16px;
            padding-top: max(8px, env(safe-area-inset-top));
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .logo {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            color: var(--accent);
        }

        .filename {
            font-size: 13px;
            color: var(--text-dim);
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            background: var(--bg);
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            min-width: 0;
            max-width: min(48vw, 480px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--accent-glow);
            color: var(--accent);
            border: 1px solid var(--border);
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--accent);
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .icon-button:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
        }

        .icon-button svg {
            width: 16px;
            height: 16px;
        }

        #app-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #viewer {
            position: absolute;
            inset: 0;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: var(--bg);
            z-index: 5;
            transition: opacity 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-dim);
        }

        .error-box {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
            z-index: 6;
        }

        .error-box.visible {
            display: flex;
        }

        .error-icon {
            font-size: 36px;
        }

        .error-msg {
            font-size: 14px;
            color: #f87171;
            max-width: 500px;
            text-align: center;
            line-height: 1.5;
        }

        .qr-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.45);
            z-index: 20;
        }

        .qr-modal.visible {
            display: flex;
        }

        .qr-card {
            padding: 14px;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
        }

        .qr-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }

        #qr-code canvas,
        #qr-code img {
            display: block;
            width: min(72vw, 256px);
            height: auto;
        }

        @media (max-width: 768px) {
            .topbar {
                padding-left: 12px;
                padding-right: 12px;
            }

            .topbar-left {
                gap: 8px;
            }

            .logo {
                font-size: 15px;
            }

            .filename {
                max-width: calc(100vw - 124px);
                font-size: 12px;
                padding: 3px 8px;
            }

            .badge {
                font-size: 10px;
                padding: 3px 6px;
            }

            .icon-button {
                width: 28px;
                height: 28px;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/molstar-4.5.0.css" />
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <span class="logo">
                <svg viewBox="0 0 24 24" aria-hidden="true" style="width:16px;height:16px;vertical-align:-2px;margin-right:4px;">
                    <circle cx="12" cy="12" r="2.3" fill="currentColor"></circle>
                    <ellipse cx="12" cy="12" rx="9" ry="3.8" fill="none" stroke="currentColor" stroke-width="1.4"></ellipse>
                    <ellipse cx="12" cy="12" rx="9" ry="3.8" fill="none" stroke="currentColor" stroke-width="1.4" transform="rotate(60 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="9" ry="3.8" fill="none" stroke="currentColor" stroke-width="1.4" transform="rotate(120 12 12)"></ellipse>
                </svg>MOLBO
            </span>
            <span class="filename">{{ filename_html }}</span>
        </div>
        <div class="topbar-right">
            <button class="icon-button" id="qr-button" type="button" aria-label="Show QR code">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M3 3h8v8H3V3Zm2 2v4h4V5H5Zm8-2h8v8h-8V3Zm2 2v4h4V5h-4ZM3 13h8v8H3v-8Zm2 2v4h4v-4H5Zm8-2h2v2h-2v-2Zm4 0h2v2h-2v-2Zm-2 2h2v2h-2v-2Zm-2 2h2v2h-2v-2Zm4 0h4v4h-2v-2h-2v-2Zm-2 2h2v2h-2v-2Zm-2 2h2v2h-2v-2Z"/>
                </svg>
            </button>
            <span class="badge">{{ format_label_html }}</span>
        </div>
    </div>

    <div id="app-container">
        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Loading structure…</div>
        </div>
        <div class="error-box" id="error">
            <div class="error-icon">⚠</div>
            <div class="error-msg" id="error-msg"></div>
        </div>
        <div id="viewer"></div>
    </div>
    <div class="qr-modal" id="qr-modal" aria-hidden="true">
        <div class="qr-card" role="dialog" aria-modal="true" aria-label="QR code">
            <div class="qr-box">
                <div id="qr-code" aria-label="QR code"></div>
            </div>
        </div>
    </div>

    <script src="/assets/molstar-4.5.0.js"></script>
    <script src="/assets/qrcode-generator-2.0.4.min.js"></script>
    <script>
        var FORMAT_MAP = {
            'pdb':   'pdb',
            'cif':   'mmcif',
            'mmcif': 'mmcif',
            'bcif':  'mmcif',
        };
        var FILE_URL = {{ file_url_json }};
        var FORMAT_KEY = {{ format_json }};
        var AUTO_CLOSE = {{ auto_close_json }};
        var SHARE_URL = {{ share_url_json }} || window.location.href;

        function applyPublicationLook(viewer) {
            viewer.plugin.managers.structure.component.setOptions({
                ...viewer.plugin.managers.structure.component.state.options,
                visualStyle: 'polymer-cartoon+ligand-ball-and-stick'
            });

            var canvas = viewer.plugin.canvas3d;
            if (!canvas) {
                return;
            }

            canvas.setProps({
                postprocessing: {
                    occlusion: { name: 'on', params: {
                        multiScale: { name: 'off', params: {} },
                        radius: 5, bias: 0.8, blurKernelSize: 15,
                        resolutionScale: 1, samples: 32,
                        color: 0x000000
                    }},
                    outline: { name: 'on', params: {
                        scale: 1, threshold: 0.33,
                        color: 0x000000, includeTransparent: true
                    }}
                },
                renderer: {
                    ambientIntensity: 1.0,
                    light: [
                        { inclination: 180, azimuth: 0, color: 0xffffff, intensity: 0.0 }
                    ]
                },
            });
        }

        function renderQrCode() {
            var qrTarget = document.getElementById('qr-code');
            if (!qrTarget || qrTarget.childElementCount > 0 || typeof qrcode !== 'function') {
                return;
            }
            var qr = qrcode(0, 'M');
            qr.addData(SHARE_URL);
            qr.make();
            qrTarget.innerHTML = qr.createImgTag(6, 16, 'Share QR code');
        }

        function showQrModal() {
            var modal = document.getElementById('qr-modal');
            if (!modal) {
                return;
            }
            renderQrCode();
            modal.classList.add('visible');
            modal.setAttribute('aria-hidden', 'false');
        }

        function hideQrModal() {
            var modal = document.getElementById('qr-modal');
            if (!modal) {
                return;
            }
            modal.classList.remove('visible');
            modal.setAttribute('aria-hidden', 'true');
        }

        function bindQrModal() {
            var qrButton = document.getElementById('qr-button');
            var modal = document.getElementById('qr-modal');

            if (qrButton) {
                qrButton.addEventListener('click', showQrModal);
            }
            if (modal) {
                modal.addEventListener('click', function (event) {
                    if (event.target === modal) {
                        hideQrModal();
                    }
                });
            }
            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape') {
                    hideQrModal();
                }
            });
        }

        async function init() {
            var loadingEl = document.getElementById('loading');
            var errorEl   = document.getElementById('error');
            var errorMsg  = document.getElementById('error-msg');

            try {
                var viewer = await molstar.Viewer.create('viewer', {
                    layoutIsExpanded: false,
                    layoutShowControls: true,
                    layoutShowRemoteState: false,
                    layoutShowSequence: true,
                    layoutShowLog: false,
                    viewportShowExpand: false,
                    viewportShowSelectionMode: true,
                    layoutShowLeftPanel: true,
                    collapseLeftPanel: true,
                });

                var fmt      = FORMAT_MAP[FORMAT_KEY] || 'mmcif';
                var isBinary = FORMAT_KEY === 'bcif';

                await viewer.loadStructureFromUrl(FILE_URL, fmt, isBinary);
                applyPublicationLook(viewer);

                loadingEl.classList.add('hidden');
            } catch (err) {
                loadingEl.classList.add('hidden');
                errorMsg.textContent = 'Failed to load structure: ' + err.message;
                errorEl.classList.add('visible');
                console.error(err);
            }
        }

        bindQrModal();
        init();

        if (AUTO_CLOSE) {
            window.addEventListener('beforeunload', function () {
                navigator.sendBeacon('/bye');
            });
            window.addEventListener('pagehide', function () {
                navigator.sendBeacon('/bye');
            });

            setInterval(function () {
                fetch('/heartbeat', { cache: 'no-store' }).catch(function () {});
            }, 5000);
        }
    </script>
</body>
</html>
