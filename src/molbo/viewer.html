<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} — Molbo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #fcfbf9;
            --surface: #dcd8cf;
            --border: #c8c1b2;
            --text: #000000;
            --text-dim: #937657;
            --accent: #937657;
            --accent-glow: #fcfbf9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            color: var(--accent);
        }

        .filename {
            font-size: 13px;
            color: var(--text-dim);
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            background: var(--bg);
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--accent-glow);
            color: var(--accent);
            border: 1px solid var(--border);
        }

        #app-container {
            flex: 1;
            position: relative;
        }

        #viewer {
            position: absolute;
            inset: 0;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: var(--bg);
            z-index: 5;
            transition: opacity 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-dim);
        }

        .error-box {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
            z-index: 6;
        }

        .error-box.visible {
            display: flex;
        }

        .error-icon {
            font-size: 36px;
        }

        .error-msg {
            font-size: 14px;
            color: #f87171;
            max-width: 500px;
            text-align: center;
            line-height: 1.5;
        }
    </style>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar@4.5.0/build/viewer/molstar.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <span class="logo"><i data-lucide="atom" style="width:16px;height:16px;vertical-align:-2px;margin-right:4px;"></i>MOLBO</span>
            <span class="filename">{{ filename }}</span>
        </div>
        <div class="topbar-right">
            <span class="badge">{{ format }}</span>
        </div>
    </div>

    <div id="app-container">
        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Loading structure…</div>
        </div>
        <div class="error-box" id="error">
            <div class="error-icon">⚠</div>
            <div class="error-msg" id="error-msg"></div>
        </div>
        <div id="viewer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/molstar@4.5.0/build/viewer/molstar.js"></script>
    <script>
        // Render Lucide icons
        lucide.createIcons();

        var FORMAT_MAP = {
            'pdb':   'pdb',
            'cif':   'mmcif',
            'mmcif': 'mmcif',
            'bcif':  'mmcif',
        };

        async function init() {
            var loadingEl = document.getElementById('loading');
            var errorEl   = document.getElementById('error');
            var errorMsg  = document.getElementById('error-msg');

            try {
                var viewer = await molstar.Viewer.create('viewer', {
                    layoutIsExpanded: false,
                    layoutShowControls: true,
                    layoutShowRemoteState: false,
                    layoutShowSequence: true,
                    layoutShowLog: false,
                    viewportShowExpand: false,
                    viewportShowSelectionMode: true,
                    layoutShowLeftPanel: true,
                    collapseLeftPanel: true,
                });

                var fileUrl  = '{{ file_url }}';
                var fmt      = FORMAT_MAP['{{ format }}'] || 'mmcif';
                var isBinary = '{{ format }}' === 'bcif';

                await viewer.loadStructureFromUrl(fileUrl, fmt, isBinary);

                // Apply stylized look: cartoon + ball-and-stick representation
                viewer.plugin.managers.structure.component.setOptions({
                    ...viewer.plugin.managers.structure.component.state.options,
                    visualStyle: 'polymer-cartoon+ligand-ball-and-stick'
                });

                // Apply stylized postprocessing (occlusion + outline) and soft lighting
                var canvas = viewer.plugin.canvas3d;
                if (canvas) {
                    canvas.setProps({
                        postprocessing: {
                            occlusion: { name: 'on', params: {
                                multiScale: { name: 'off', params: {} },
                                radius: 5, bias: 0.8, blurKernelSize: 15,
                                resolutionScale: 1, samples: 32,
                                color: 0x000000
                            }},
                            outline: { name: 'on', params: {
                                scale: 1, threshold: 0.33,
                                color: 0x000000, includeTransparent: true
                            }}
                        },
                        renderer: {
                            ambientIntensity: 1.0,
                            light: [
                                { inclination: 180, azimuth: 0, color: 0xffffff, intensity: 0.0 }
                            ]
                        }, 
                    });
                }

                loadingEl.classList.add('hidden');
            } catch (err) {
                loadingEl.classList.add('hidden');
                errorMsg.textContent = 'Failed to load structure: ' + err.message;
                errorEl.classList.add('visible');
                console.error(err);
            }
        }

        init();

        // Instant shutdown on tab close via sendBeacon
        window.addEventListener('beforeunload', function () {
            navigator.sendBeacon('/bye');
        });
        window.addEventListener('pagehide', function () {
            navigator.sendBeacon('/bye');
        });

        // Heartbeat as fallback
        setInterval(function () {
            fetch('/heartbeat').catch(function () {});
        }, 500);
    </script>
</body>
</html>
